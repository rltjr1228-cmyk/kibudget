<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1d9e75">
<title>나의 가계부</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1411;
  --surface:#19211c;
  --surface2:#212b25;
  --line:rgba(255,255,255,0.08);
  --line2:rgba(255,255,255,0.14);
  --text:#f0f4f1;
  --text2:#9aa8a0;
  --text3:#67746c;
  --green:#34c98a;
  --green-dim:#1d6e52;
  --amber:#e8a13c;
  --red:#e8635f;
  --accent:#34c98a;
  --radius:18px;
  --radius-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,system-ui,sans-serif;}
body{max-width:480px;margin:0 auto;min-height:100vh;padding:0 0 90px;}
.display{font-family:'Gowun Dodum',serif;}

/* header */
header{padding:28px 22px 18px;}
.eyebrow{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;}
.month-nav h1{font-size:23px;font-weight:600;letter-spacing:-0.01em;}
.month-btns{display:flex;gap:8px;}
.mbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line2);background:transparent;color:var(--text2);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
.mbtn:active{transform:scale(.92);background:var(--surface2);}
.mbtn:disabled{opacity:.3;}

/* hero result */
.hero{margin:6px 22px 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px 22px;position:relative;overflow:hidden;}
.hero .label{font-size:13px;color:var(--text2);margin-bottom:8px;}
.hero .amount{font-size:42px;font-weight:600;letter-spacing:-0.02em;line-height:1;font-family:'Gowun Dodum',serif;}
.hero .amount .won{font-size:26px;opacity:.7;margin-right:2px;}
.track{height:10px;border-radius:6px;background:var(--surface2);margin:20px 0 8px;overflow:hidden;}
.track .fill{height:100%;border-radius:6px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1),background .4s;}
.hero .status{font-size:13px;display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* stat pills */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 22px 0;}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;}
.stat .k{font-size:12px;color:var(--text3);margin-bottom:4px;}
.stat .v{font-size:18px;font-weight:500;}

/* section */
.sec{margin:26px 22px 0;}
.sec-h{font-size:13px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.sec-h .edit{color:var(--accent);font-size:12px;cursor:pointer;text-transform:none;letter-spacing:0;}

/* input rows */
.field{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:4px 16px;margin-bottom:10px;}
.field-in{display:flex;align-items:center;justify-content:space-between;padding:12px 0;}
.field-in .nm{font-size:15px;}
.field-in .nm small{display:block;font-size:11px;color:var(--text3);margin-top:2px;}
.field-in input{background:transparent;border:none;color:var(--text);font-size:19px;font-weight:500;text-align:right;width:150px;font-family:'Pretendard';outline:none;}
.field-in input::placeholder{color:var(--text3);}

/* fixed list */
.fixed{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:6px 16px;}
.fline{display:flex;justify-content:space-between;padding:11px 0;font-size:14px;border-bottom:1px solid var(--line);}
.fline:last-child{border-bottom:none;}
.fline .fn{color:var(--text2);}
.fline.tot{font-weight:600;color:var(--text);}
.fline.tot .fv{color:var(--red);}
.note{font-size:12px;color:var(--text3);line-height:1.7;margin:10px 4px 0;}

/* chart */
.chartwrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:18px 14px 10px;}
.bars{display:flex;align-items:flex-end;gap:8px;height:130px;padding:0 4px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;cursor:pointer;}
.bar-v{width:100%;max-width:34px;border-radius:5px 5px 0 0;transition:.3s;min-height:3px;}
.bar-lbl{font-size:10px;color:var(--text3);white-space:nowrap;}
.bar-amt{font-size:9px;color:var(--text2);}
.empty-chart{text-align:center;color:var(--text3);font-size:13px;padding:36px 0;}

/* save bar */
.savebar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;padding:14px 22px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 22%);}
.save{width:100%;height:52px;border:none;border-radius:14px;background:var(--accent);color:#06251a;font-size:16px;font-weight:600;cursor:pointer;font-family:'Pretendard';transition:.15s;}
.save:active{transform:scale(.98);}
.save.saved{background:var(--surface2);color:var(--green);}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.overlay.on{display:flex;}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:24px 22px calc(24px + env(safe-area-inset-bottom));border-top:1px solid var(--line2);max-height:84vh;overflow-y:auto;}
.sheet h3{font-size:18px;font-weight:600;margin-bottom:4px;}
.sheet p.sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);}
.mrow label{font-size:14px;color:var(--text2);}
.mrow input{background:var(--surface2);border:1px solid var(--line);border-radius:9px;color:var(--text);font-size:16px;text-align:right;width:140px;padding:9px 12px;font-family:'Pretendard';outline:none;}
.mrow input:focus{border-color:var(--accent);}
.sheet .done{width:100%;height:50px;border:none;border-radius:13px;background:var(--accent);color:#06251a;font-size:16px;font-weight:600;margin-top:22px;cursor:pointer;font-family:'Pretendard';}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid var(--line);font-size:14px;}
.history-row .hm{color:var(--text2);}
.history-row .ha{font-weight:500;}
.del{color:var(--red);font-size:12px;cursor:pointer;margin-left:12px;opacity:.7;}
</style>
</head>
<body>

<header>
  <div class="eyebrow">나의 가계부</div>
  <div class="month-nav">
    <h1 class="display" id="monthTitle">—</h1>
    <div class="month-btns">
      <button class="mbtn" id="prevM">‹</button>
      <button class="mbtn" id="nextM">›</button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="label" id="heroLabel">남은 돈 · 저축 가능액</div>
  <div class="amount" id="heroAmt"><span class="won">₩</span>0</div>
  <div class="track"><div class="fill" id="heroFill"></div></div>
  <div class="status" id="heroStatus"><span class="dot"></span><span>카드값을 입력해보세요</span></div>
</div>

<div class="stats">
  <div class="stat"><div class="k">이번 달 총 지출</div><div class="v" id="stOut">₩0</div></div>
  <div class="stat"><div class="k">월급</div><div class="v" id="stSalary">₩3,570,000</div></div>
</div>

<div class="sec">
  <div class="sec-h">카드 지출 입력</div>
  <div class="field">
    <div class="field-in">
      <div class="nm">국민카드<small>보험·OTT·기부금 자동결제 포함</small></div>
      <input type="number" id="inKB" inputmode="numeric" placeholder="0">
    </div>
  </div>
  <div class="field">
    <div class="field-in">
      <div class="nm">현대카드<small>장기대출 상환 ₩147,600 포함</small></div>
      <input type="number" id="inHD" inputmode="numeric" placeholder="0">
    </div>
  </div>
</div>

<div class="sec">
  <div class="sec-h">통장 자동이체 고정비 <span class="edit" id="editFixed">수정</span></div>
  <div class="fixed" id="fixedList"></div>
  <div class="note">보험·OTT·기부금과 현대카드 대출은 카드 청구액에 이미 포함돼 따로 빼지 않아요.</div>
</div>

<div class="sec">
  <div class="sec-h">월별 추이 <span class="edit" id="openHist">기록 보기</span></div>
  <div class="chartwrap">
    <div class="bars" id="bars"></div>
  </div>
</div>

<div class="savebar">
  <button class="save" id="saveBtn">이번 달 저장</button>
</div>

<div class="overlay" id="fixedOverlay">
  <div class="sheet">
    <h3>고정비 · 월급 수정</h3>
    <p class="sub">통장에서 직접 나가는 금액만 적어주세요.</p>
    <div class="mrow"><label>월급</label><input type="number" id="exSalary" inputmode="numeric"></div>
    <div class="mrow"><label>월세</label><input type="number" id="exRent" inputmode="numeric"></div>
    <div class="mrow"><label>전세 이자</label><input type="number" id="exJeonse" inputmode="numeric"></div>
    <div class="mrow"><label>햇살론1 원리금</label><input type="number" id="exL1" inputmode="numeric"></div>
    <div class="mrow"><label>햇살론2 원리금</label><input type="number" id="exL2" inputmode="numeric"></div>
    <div class="mrow"><label>카카오 비상금 이자</label><input type="number" id="exKakao" inputmode="numeric"></div>
    <button class="done" id="saveFixed">완료</button>
  </div>
</div>

<div class="overlay" id="histOverlay">
  <div class="sheet">
    <h3>저장된 기록</h3>
    <p class="sub">달을 눌러 그 달로 이동해요.</p>
    <div id="histList"></div>
    <button class="done" id="closeHist">닫기</button>
  </div>
</div>

<script>
const KEY='budget_app_v1';
const won=n=>'₩'+Math.round(n).toLocaleString('ko-KR');
const ym=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
const ymLabel=s=>{const[y,m]=s.split('-');return y+'년 '+parseInt(m)+'월';};

const DEFAULT_FIXED={salary:3570000,rent:200000,jeonse:251300,l1:44400,l2:57100,kakao:26300};

function load(){
  try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.fixed&&r.months)return r;}catch(e){}
  return {fixed:{...DEFAULT_FIXED},months:{}};
}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}

let state=load();
let cur=ym(new Date());

function fixedTotal(){const f=state.fixed;return f.rent+f.jeonse+f.l1+f.l2+f.kakao;}

function renderFixed(){
  const f=state.fixed;
  const rows=[
    ['월세',f.rent],['전세 이자',f.jeonse],
    ['햇살론1 원리금',f.l1],['햇살론2 원리금',f.l2],
    ['카카오 비상금 이자',f.kakao]
  ];
  let h='';
  rows.forEach(r=>{h+=`<div class="fline"><span class="fn">${r[0]}</span><span class="fv">${won(r[1])}</span></div>`;});
  h+=`<div class="fline tot"><span class="fn">고정비 합계</span><span class="fv">${won(fixedTotal())}</span></div>`;
  document.getElementById('fixedList').innerHTML=h;
}

function curData(){return state.months[cur]||{kb:null,hd:null};}

function renderMonth(){
  document.getElementById('monthTitle').textContent=ymLabel(cur);
  const d=curData();
  document.getElementById('inKB').value=d.kb??'';
  document.getElementById('inHD').value=d.hd??'';
  const nowM=ym(new Date());
  document.getElementById('nextM').disabled=(cur>=nowM);
  document.getElementById('stSalary').textContent=won(state.fixed.salary);
  calc();
}

function calc(){
  const kb=parseFloat(document.getElementById('inKB').value)||0;
  const hd=parseFloat(document.getElementById('inHD').value)||0;
  const cards=kb+hd;
  const totalOut=cards+fixedTotal();
  const left=state.fixed.salary-totalOut;
  document.getElementById('stOut').textContent=won(totalOut);
  document.getElementById('heroAmt').innerHTML=(left<0?'-':'')+'<span class="won">₩</span>'+Math.abs(Math.round(left)).toLocaleString('ko-KR');
  const pct=Math.max(0,Math.min(100,(totalOut/state.fixed.salary)*100));
  const fill=document.getElementById('heroFill');
  fill.style.width=pct+'%';
  const amtEl=document.getElementById('heroAmt');
  const dot=document.querySelector('#heroStatus .dot');
  const txt=document.querySelector('#heroStatus span:last-child');
  let c,msg;
  if(left<0){c='var(--red)';msg='적자예요 · 카드값을 '+won(-left)+' 줄여야 해요';}
  else if(left<300000){c='var(--amber)';msg='빠듯해요 · 저축 여유가 거의 없어요';}
  else{c='var(--green)';msg=won(left)+' 저축할 수 있어요';}
  fill.style.background=c;amtEl.style.color=c;dot.style.background=c;txt.textContent=msg;
}

function renderChart(){
  const keys=Object.keys(state.months).filter(k=>{const m=state.months[k];return (m.kb||m.hd);}).sort();
  const last=keys.slice(-6);
  const bars=document.getElementById('bars');
  if(last.length===0){bars.innerHTML='<div class="empty-chart">저장된 달이 없어요<br>카드값 입력 후 저장하면 여기 쌓여요</div>';return;}
  const vals=last.map(k=>{const m=state.months[k];return (m.kb||0)+(m.hd||0);});
  const max=Math.max(...vals,1);
  let h='';
  last.forEach((k,i)=>{
    const v=vals[i];const hp=(v/max)*100;
    const lim=state.fixed.salary-fixedTotal();
    const col=v>lim?'var(--red)':(v>lim*0.9?'var(--amber)':'var(--green-dim)');
    const mm=parseInt(k.split('-')[1]);
    h+=`<div class="bar-col" data-k="${k}"><div class="bar-amt">${(v/10000).toFixed(0)}만</div><div class="bar-v" style="height:${hp}%;background:${col}"></div><div class="bar-lbl">${mm}월</div></div>`;
  });
  bars.innerHTML=h;
  bars.querySelectorAll('.bar-col').forEach(el=>{el.onclick=()=>{cur=el.dataset.k;renderMonth();};});
}

document.getElementById('inKB').addEventListener('input',calc);
document.getElementById('inHD').addEventListener('input',calc);

document.getElementById('saveBtn').addEventListener('click',()=>{
  const kb=parseFloat(document.getElementById('inKB').value);
  const hd=parseFloat(document.getElementById('inHD').value);
  state.months[cur]={kb:isNaN(kb)?null:kb,hd:isNaN(hd)?null:hd};
  save(state);
  const b=document.getElementById('saveBtn');
  b.textContent='저장됐어요 ✓';b.classList.add('saved');
  setTimeout(()=>{b.textContent='이번 달 저장';b.classList.remove('saved');},1400);
  renderChart();
});

document.getElementById('prevM').addEventListener('click',()=>{
  const[y,m]=cur.split('-').map(Number);const d=new Date(y,m-2,1);cur=ym(d);renderMonth();
});
document.getElementById('nextM').addEventListener('click',()=>{
  if(cur>=ym(new Date()))return;
  const[y,m]=cur.split('-').map(Number);const d=new Date(y,m,1);cur=ym(d);renderMonth();
});

const fo=document.getElementById('fixedOverlay');
document.getElementById('editFixed').addEventListener('click',()=>{
  const f=state.fixed;
  exSalary.value=f.salary;exRent.value=f.rent;exJeonse.value=f.jeonse;
  exL1.value=f.l1;exL2.value=f.l2;exKakao.value=f.kakao;
  fo.classList.add('on');
});
document.getElementById('saveFixed').addEventListener('click',()=>{
  state.fixed={
    salary:+exSalary.value||0,rent:+exRent.value||0,jeonse:+exJeonse.value||0,
    l1:+exL1.value||0,l2:+exL2.value||0,kakao:+exKakao.value||0
  };
  save(state);fo.classList.remove('on');renderFixed();renderMonth();renderChart();
});
fo.addEventListener('click',e=>{if(e.target===fo)fo.classList.remove('on');});

const ho=document.getElementById('histOverlay');
document.getElementById('openHist').addEventListener('click',()=>{
  const keys=Object.keys(state.months).sort().reverse();
  let h='';
  if(keys.length===0)h='<div style="text-align:center;color:var(--text3);padding:30px 0;font-size:13px;">아직 저장된 기록이 없어요</div>';
  keys.forEach(k=>{
    const m=state.months[k];const v=(m.kb||0)+(m.hd||0);const left=state.fixed.salary-v-fixedTotal();
    const lc=left<0?'var(--red)':'var(--green)';
    h+=`<div class="history-row"><span class="hm" data-go="${k}" style="cursor:pointer">${ymLabel(k)}</span><span style="display:flex;align-items:center"><span class="ha">카드 ${won(v)} · 남음 <span style="color:${lc}">${won(left)}</span></span><span class="del" data-del="${k}">삭제</span></span></div>`;
  });
  document.getElementById('histList').innerHTML=h;
  ho.classList.add('on');
  document.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{cur=el.dataset.go;renderMonth();ho.classList.remove('on');});
  document.querySelectorAll('[data-del]').forEach(el=>el.onclick=()=>{delete state.months[el.dataset.del];save(state);el.closest('.history-row').remove();renderChart();});
});
document.getElementById('closeHist').addEventListener('click',()=>ho.classList.remove('on'));
ho.addEventListener('click',e=>{if(e.target===ho)ho.classList.remove('on');});

renderFixed();renderMonth();renderChart();
</script>
</body>
</html>
